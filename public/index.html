<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT. Gunex Transport Indonesia — Mitra Logistik Darat B2B Sejak 2008</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="boot-loader" id="bootLoader">
  <div class="boot-loader-inner">
    <svg class="boot-logo" viewBox="0 0 64 64" aria-hidden="true">
      <rect x="2" y="2" width="60" height="60" rx="14" fill="#1d3d87"/>
      <line x1="7" y1="27" x2="17" y2="27" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
      <line x1="5" y1="34" x2="15" y2="34" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
      <line x1="8" y1="41" x2="16" y2="41" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
      <rect x="18" y="22" width="21" height="19" rx="2.5" fill="#fff"/>
      <path d="M39 28 h8 l6 6 v7 h-14 z" fill="#fff"/>
      <rect x="44" y="30" width="6" height="5" rx="1" fill="#1d3d87"/>
      <circle cx="25" cy="45" r="4.2" fill="#fff" stroke="#1d3d87" stroke-width="2.2"/>
      <circle cx="46" cy="45" r="4.2" fill="#fff" stroke="#1d3d87" stroke-width="2.2"/>
    </svg>
    <div class="boot-word">GUNEX<span>TRANSPORT</span></div>
    <div class="boot-track"><div class="boot-fill" id="bootFill"></div></div>
  </div>
  <div class="boot-grid" aria-hidden="true"></div>
</div>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="gunex-mark" viewBox="0 0 64 64">
    <rect x="2" y="2" width="60" height="60" rx="14" fill="#1d3d87"/>
    <line x1="7" y1="27" x2="17" y2="27" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
    <line x1="5" y1="34" x2="15" y2="34" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
    <line x1="8" y1="41" x2="16" y2="41" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
    <rect x="18" y="22" width="21" height="19" rx="2.5" fill="#fff"/>
    <path d="M39 28 h8 l6 6 v7 h-14 z" fill="#fff"/>
    <rect x="44" y="30" width="6" height="5" rx="1" fill="#1d3d87"/>
    <circle cx="25" cy="45" r="4.2" fill="#fff" stroke="#1d3d87" stroke-width="2.2"/>
    <circle cx="46" cy="45" r="4.2" fill="#fff" stroke="#1d3d87" stroke-width="2.2"/>
  </symbol>
</svg>

<header>
  <div class="nav-inner">
    <a href="#km00" class="logo-lockup">
      <svg class="logo-icon"><use href="#gunex-mark"/></svg>
      <span class="logo-word"><span class="l1">GUNEX</span><span class="l2">TRANSPORT</span></span>
    </a>
    <nav><ul>
      <li><a href="#tentang">Tentang</a></li>
      <li><a href="#layanan">Layanan</a></li>
      <li><a href="#armada">Armada</a></li>
      <li><a href="#wilayah">Wilayah</a></li>
      <li><a href="#klien">Klien</a></li>
    </ul></nav>
    <a href="#kontak" class="nav-cta">Hubungi Kami</a>
  </div>
</header>

<main id="app">
  <!-- Konten dirender otomatis oleh app.js dari /api/content -->
</main>

<footer>
  <div class="wrap foot-inner">
    <div class="logo-lockup on-blue">
      <svg class="logo-icon"><use href="#gunex-mark"/></svg>
      <span class="logo-word"><span class="l1">GUNEX</span><span class="l2">TRANSPORT</span></span>
    </div>
    <div id="footerText">© 2008–2026 PT. Gunex Transport Indonesia.</div>
    <a href="/admin" class="foot-admin-link">Admin</a>
  </div>
</footer>

<script src="/app.js"></script>
</body>
</html>
