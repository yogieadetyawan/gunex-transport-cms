          <input type="text" id="pserial_${partKey}" placeholder="cth: DR${partKey.toUpperCase()}-0192837" value="${p ? escapeHtml(p.serial||'') : ''}">
        </div>
        <div class="field" style="margin-bottom:0;">
          <label class="field-label">Kondisi</label>
          <div class="segmented" id="pseg_${partKey}">
            <div class="seg-opt ${(!p || p.condition==='baru')?'active':''}" onclick="setPartCondition('${partKey}','baru')">Baru</div>
            <div class="seg-opt ${(p && p.condition==='vulkanisir')?'active':''}" onclick="setPartCondition('${partKey}','vulkanisir')">Vulkanisir</div>
          </div>
        </div>
      </div>
    </div>`;
}

/* Ban dalam & ban perut: hanya checkbox dilakukan + catatan opsional.
   Tidak ada nomor seri / kondisi baru-vulkanisir untuk kedua part ini. */
function simplePartFieldHtml(partKey, label, existing){
  const p = existing && existing.parts ? existing.parts[partKey] : null;
  const checked = !!p;
  return `
    <div style="border:1px solid var(--line); border-radius:var(--radius-sm); padding:11px 12px; margin-bottom:9px; background:var(--bg-soft);">
      <label style="display:flex; align-items:center; gap:10px; cursor:pointer; margin-bottom:0;">
        <input type="checkbox" id="pchk_${partKey}" ${checked?'checked':''} onchange="togglePartSub('${partKey}')" style="width:22px; height:22px; flex-shrink:0; accent-color:var(--accent); margin:0;">
        <span style="font-size:15px; font-weight:600; color:var(--text); flex:1;">${label}</span>
      </label>
      <div id="psub_${partKey}" style="margin-top:10px; display:${checked?'block':'none'};">
        <div class="field" style="margin-bottom:0;">
          <label class="field-label">Catatan (opsional)</label>
          <input type="text" id="pnote_${partKey}" placeholder="cth: diganti bersamaan dengan ban luar" value="${p ? escapeHtml(p.note||'') : ''}">
        </div>
      </div>
    </div>`;
}

function togglePartSub(key){
  const checked = document.getElementById('pchk_'+key).checked;
  document.getElementById('psub_'+key).style.display = checked ? 'block' : 'none';
}
function setPartCondition(key, value){
  const seg = document.getElementById('pseg_'+key);
  seg.querySelectorAll('.seg-opt').forEach((el,i) => el.classList.toggle('active', (value==='baru' && i===0) || (value==='vulkanisir' && i===1)));
  seg.dataset.value = value;
}

/* Ditampilkan saat posisi ban diketuk dari diagram truck / grid slot.
   Jika posisi belum ada riwayat -> langsung buka form tambah baru.
   Jika sudah ada riwayat -> beri pilihan jelas: tambah riwayat baru,
   atau lihat & kelola riwayat yang sudah ada. Ini mencegah ketukan pada
   posisi yang sudah terisi otomatis meng-update data lama. */
function openTirePositionMenu(vehicleId, posKey){
  const existing = getLatestTireForPosition(vehicleId, posKey);
  if(!existing){
    openTireForm(vehicleId, posKey);
    return;
  }
  const pos = TIRE_POSITIONS.find(p => p.key === posKey);
  const v = getVehicle(vehicleId);
  const html = sheetWrap(`${pos.label} (${pos.key})`, `
    <div class="field-hint" style="margin-bottom:14px;">${escapeHtml(v.plate)} · Riwayat terakhir diganti ${fmtDate(existing.date)}</div>
    <button class="btn btn-primary" onclick="closeSheet(); setTimeout(()=>openTireForm('${vehicleId}','${posKey}'),200);">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      Tambah Riwayat Baru
    </button>
    <button class="btn btn-ghost" style="margin-top:10px;" onclick="closeSheet(); setTimeout(()=>openTirePositionHistory('${vehicleId}','${posKey}'),200);">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 8v4l3 3M21 12a9 9 0 1 1-9-9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Lihat Riwayat Posisi Ini
    </button>
  `);
  openSheet(html);
}

/* Daftar seluruh riwayat untuk SATU posisi tertentu pada satu kendaraan,
   masing-masing dengan tombol Edit/Hapus sendiri-sendiri. */
function openTirePositionHistory(vehicleId, posKey){
  const v = getVehicle(vehicleId);
  const pos = TIRE_POSITIONS.find(p => p.key === posKey);
  const events = DB.tireEvents
    .filter(t => t.vehicleId === vehicleId && t.position === posKey)
    .sort((a,b)=> b.date.localeCompare(a.date) || b.createdAt.localeCompare(a.createdAt));

  const rows = events.map(e => {
    const partsHtml = Object.entries(e.parts||{}).map(([k,p]) => {
      if(k === 'luar'){
        return `<div class="detail-row"><span class="dl">${TIRE_PART_LABELS[k]}</span><span class="dv">${p.serial ? escapeHtml(p.serial) : '—'} · ${p.condition==='vulkanisir'?'Vulkanisir':'Baru'}</span></div>`;
      }
      return `<div class="detail-row"><span class="dl">${TIRE_PART_LABELS[k]}</span><span class="dv">Diganti${p.note ? ' · '+escapeHtml(p.note) : ''}</span></div>`;
    }).join('');
    return `
    <div class="panel" style="margin-bottom:10px;">
      <div class="list-card-top" style="margin-bottom:6px;">
        <span class="plate-chip">${fmtDate(e.date)}</span>
      </div>
      ${partsHtml}
      ${e.note ? `<div class="field-hint" style="margin-top:8px;">${escapeHtml(e.note)}</div>` : ''}
      <div class="btn-row" style="margin-top:10px;">
        <button class="btn btn-sm btn-danger" style="flex:1;" onclick="deleteTireEvent('${e.id}','${vehicleId}','positionhistory:${posKey}')">
          <svg viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0l-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
          Hapus
        </button>
        <button class="btn btn-sm" style="flex:1;" onclick="closeSheet(); setTimeout(()=>openTireForm('${vehicleId}','${posKey}','${e.id}'),200);">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Edit
        </button>
      </div>
    </div>`;
  }).join('');

  const html = sheetWrap(`Riwayat ${pos.label} — ${v.plate}`, `
    ${rows || `<div class="empty-state"><div class="es-title">Belum ada riwayat</div></div>`}
    <button class="btn btn-primary" style="margin-top:6px;" onclick="closeSheet(); setTimeout(()=>openTireForm('${vehicleId}','${posKey}'),200);">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      Tambah Riwayat Baru
    </button>
  `);
  openSheet(html);
}

function openTireForm(vehicleId, posKey, eventIdOverride){

      <button class="btn btn-primary" onclick="saveTireEvent('${vehicleId}','${posKey}'${isEdit?`,'${existing.id}'`:''})"><svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>${isEdit?'Simpan Perubahan':'Simpan Riwayat Baru'}</button>
    </div>
  `);
  openSheet(html);
  // ensure segmented default rendered correctly for ban luar (existing condition already reflected via class above)
  const segLuar = document.getElementById('pseg_luar');
  const pLuar = existing && existing.parts ? existing.parts.luar : null;
  segLuar.dataset.value = (pLuar && pLuar.condition) ? pLuar.condition : 'baru';
}

function saveTireEvent(vehicleId, posKey, existingId){
  const date = document.getElementById('tf_date').value;
  if(!date){ showToast('Mohon isi tanggal penggantian', true); return; }

  const parts = {};
  let anyPart = false;

  // Ban luar: serial + kondisi (baru/vulkanisir)
  if(document.getElementById('pchk_luar').checked){
    const serial = document.getElementById('pserial_luar').value.trim();
    const condition = document.getElementById('pseg_luar').dataset.value || 'baru';
    parts.luar = { serial, condition };
    anyPart = true;
  }
  // Ban dalam & ban perut: hanya catatan opsional, tanpa serial/kondisi
  ['dalam','perut'].forEach(k => {
    if(document.getElementById('pchk_'+k).checked){
      const note = document.getElementById('pnote_'+k).value.trim();
      parts[k] = { note };
      anyPart = true;
    }
  });

  if(!anyPart){
    showToast('Pilih minimal satu komponen ban (luar/dalam/perut)', true);
    return;
  }
  // overall condition for the dot indicator: hanya ditentukan oleh kondisi ban luar
  const overallCondition = (parts.luar && parts.luar.condition === 'vulkanisir') ? 'vulkanisir' : 'baru';
  const note = document.getElementById('tf_note').value.trim();

  if(existingId){
    const t = DB.tireEvents.find(x => x.id === existingId);
    t.date = date; t.parts = parts; t.condition = overallCondition; t.note = note;
  } else {
    DB.tireEvents.push({ id: uid('tire'), vehicleId, position: posKey, date, parts, condition: overallCondition, note, createdAt: todayISO() });
  }
  saveDB();
  closeSheet();
  showToast('Data ban tersimpan');
  if(currentTab === 'tire' && tireViewMode === 'riwayat'){
    // langsung kembali ke flat list riwayat ban — data baru langsung tampak bertambah
    renderTireList();
  } else {
    setTimeout(()=> openTireDashboard(vehicleId), 150);
    if(currentTab==='tire' && tireSelectedVehicle!==vehicleId) renderTireList();
  }
}

function deleteTireEvent(eventId, vehicleId, returnTo){
  if(!confirm('Hapus data ban posisi ini?')) return;
  DB.tireEvents = DB.tireEvents.filter(t => t.id !== eventId);
  saveDB();
  closeSheet();
  showToast('Data ban dihapus');
  if(returnTo && returnTo.startsWith('positionhistory:')){
    const posKey = returnTo.split(':')[1];
    setTimeout(()=> openTirePositionHistory(vehicleId, posKey), 150);
  } else if(returnTo === 'history'){
    setTimeout(()=> openTireHistory(vehicleId), 150);
  } else if(returnTo === 'flatlist'){
    // tetap di flat list riwayat ban, hanya re-render
  } else {
    setTimeout(()=> openTireDashboard(vehicleId), 150);
  }
  if(currentTab==='tire') renderTireList();
}

let pajakSearchQuery = '';
let pajakFilterStatus = ''; // '' = semua, 'attention' = expired/warning saja

function renderPajakList(){
  const el = document.getElementById('view-pajak');
  const q = pajakSearchQuery.trim().toLowerCase();

  let list = DB.vehicles.filter(v => {
    if(!q) return true;
    const catName = (getCategoryLabel(v.categoryId) || '').toLowerCase();
    return v.plate.toLowerCase().includes(q) || v.merk.toLowerCase().includes(q) || v.type.toLowerCase().includes(q) || catName.includes(q);
  });

  // urutkan berdasarkan urgensi: expired dulu, lalu warning, lalu ok, lalu none — masing2 diurutkan dari yang paling mendesak
  function urgencyRank(v){
    const p = getExpiryStatus(v.pajakExpiry);
    const k = getExpiryStatus(v.kirExpiry);
    const ranks = { expired: 0, warning: 1, ok: 2, none: 3 };
    return Math.min(ranks[p.status], ranks[k.status]);
  }
  function nearestDaysLeft(v){
    const p = getExpiryStatus(v.pajakExpiry);
    const k = getExpiryStatus(v.kirExpiry);
    const vals = [p, k].filter(x => x.daysLeft !== null).map(x => x.daysLeft);
    return vals.length ? Math.min(...vals) : Infinity;
  }
  list = list.slice().sort((a,b) => {
    const ra = urgencyRank(a), rb = urgencyRank(b);
    if(ra !== rb) return ra - rb;
    return nearestDaysLeft(a) - nearestDaysLeft(b);
  });

  if(pajakFilterStatus === 'attention'){
    list = list.filter(v => {
      const p = getExpiryStatus(v.pajakExpiry);
      const k = getExpiryStatus(v.kirExpiry);
      return p.status==='expired' || p.status==='warning' || k.status==='expired' || k.status==='warning';
    });
  }

  let rows = '';
  if(list.length === 0){
    rows = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none"><path d="M7 3h10a1 1 0 0 1 1 1v16a1 1 0 0 1-1.5.87L13 19l-1.5 1.87L10 19l-2.5 1.87L6 19l-1.5 1.87A1 1 0 0 1 3 20V4a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        <div class="es-title">${DB.vehicles.length===0 ? 'Belum ada kendaraan' : 'Tidak ditemukan'}</div>
        <div class="es-sub">${DB.vehicles.length===0 ? 'Tambahkan kendaraan terlebih dahulu' : 'Coba kata kunci atau filter lain'}</div>
      </div>`;
  } else {
    rows = list.map(v => {
      const pajakInfo = getExpiryStatus(v.pajakExpiry);
      const kirInfo = getExpiryStatus(v.kirExpiry);
      return `
      <div class="list-card" onclick="openPajakKirForm('${v.id}')">
        <div class="list-card-top">
          <span class="plate-chip">${escapeHtml(v.plate)}</span>
        </div>
        <div class="list-card-sub">${escapeHtml(v.merk)} · ${escapeHtml(v.type)}</div>
        <div class="detail-row" style="padding:7px 0;">
          <span class="dl">Pajak (STNK)</span>
          <span class="dv" style="color:${expiryStatusColor(pajakInfo.status)}">${v.pajakExpiry ? fmtDate(v.pajakExpiry)+' · '+expiryStatusLabel(pajakInfo) : 'Belum diisi'}</span>
        </div>
        <div class="detail-row" style="padding:7px 0;">
          <span class="dl">KIR</span>
          <span class="dv" style="color:${expiryStatusColor(kirInfo.status)}">${v.kirExpiry ? fmtDate(v.kirExpiry)+' · '+expiryStatusLabel(kirInfo) : 'Belum diisi'}</span>
        </div>
      </div>`;
    }).join('');
  }

  const attentionCount = getExpiringVehicles().length;

  el.innerHTML = `
    <div class="view-header">
      <div class="view-title">Pajak &amp; KIR</div>
      <div class="view-sub">${DB.vehicles.length} kendaraan · peringatan H-${EXPIRY_WARNING_DAYS} hari sebelum jatuh tempo</div>
    </div>
    <div class="search-bar">
      <input type="text" placeholder="Cari no. polisi, merk, atau type..." value="${escapeHtml(pajakSearchQuery)}" oninput="pajakSearchQuery=this.value; renderPajakList();">
      <select style="width:auto; flex-shrink:0; max-width:150px;" onchange="pajakFilterStatus=this.value; renderPajakList();">
        <option value="">Semua Kendaraan</option>
        <option value="attention" ${pajakFilterStatus==='attention'?'selected':''}>Perlu Perhatian (${attentionCount})</option>
      </select>
    </div>
    ${rows}
  `;
}

function renderDashboard(){
  const el = document.getElementById('view-dashboard');
  const totalVeh = DB.vehicles.length;
  const totalSvc = DB.services.length;
  const totalTire = DB.tireEvents.length;

  const today = todayISO();
  const recentServices = DB.services.slice().sort((a,b)=> b.date.localeCompare(a.date)).slice(0,4);
  const recentTires = DB.tireEvents.slice().sort((a,b)=> b.date.localeCompare(a.date)).slice(0,4);

  // vehicles with no service in last 90 days (only counted if they have at least 1 vehicle and 1 service record exists overall, otherwise skip alarming empty state)
  let staleList = [];
  if(totalVeh > 0){
    staleList = DB.vehicles.filter(v => {
      const svcs = DB.services.filter(s => s.vehicleId === v.id);
      if(svcs.length === 0) return true;
      const last = svcs.slice().sort((a,b)=>b.date.localeCompare(a.date))[0];
      return daysBetween(last.date, today) > 90;
    });
  }

  const recentCombined = [
    ...recentServices.map(s => ({ type:'service', date:s.date, data:s })),
    ...recentTires.map(t => ({ type:'tire', date:t.date, data:t })),
  ].sort((a,b)=> b.date.localeCompare(a.date)).slice(0,5);

  const recentHtml = recentCombined.length === 0
    ? `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 8v4l3 3M21 12a9 9 0 1 1-9-9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <div class="es-title">Belum ada aktivitas</div>
        <div class="es-sub">Mulai dengan menambah kendaraan</div>
      </div>`
    : recentCombined.map(item => {
        const v = getVehicle(item.data.vehicleId);
        if(item.type === 'service'){
          const doneCount = SERVICE_ITEMS.filter(it=>item.data.items[it.key]).length;
          return `<div class="list-card" onclick="switchTab('service'); setTimeout(()=>openServiceDetail('${item.data.id}'),250);">

            <div class="list-card-sub">Service · ${doneCount} item dikerjakan</div>
          </div>`;
        } else {
          const pos = TIRE_POSITIONS.find(p=>p.key===item.data.position);
          return `<div class="list-card" onclick="switchTab('tire'); setTimeout(()=>openTireDashboard('${item.data.vehicleId}'),250);">
            <div class="list-card-top"><span class="plate-chip">${v?escapeHtml(v.plate):'—'}</span><div class="list-card-date">${fmtDate(item.date)}</div></div>
            <div class="list-card-sub">Ganti Ban · ${pos?pos.label:item.data.position}</div>
          </div>`;

      }).join('');

  const staleHtml = staleList.length === 0 ? '' : `
    <div class="divider-label"><span>Perlu Perhatian</span></div>
    <div class="panel" style="border-color: rgba(251,191,107,0.3);">

        <svg viewBox="0 0 24 24" fill="none"><path d="M12 9v4m0 4h.01M10.3 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.7 3.86a2 2 0 0 0-3.4 0z" stroke="currentColor" stroke-width="1.6"/></svg>
        Belum Service 90+ Hari

    <div class="panel" style="border-color: rgba(251,125,125,0.3);">
      <div class="panel-title" style="color:var(--bad);">
        <svg viewBox="0 0 24 24" fill="none"><path d="M7 3h10a1 1 0 0 1 1 1v16a1 1 0 0 1-1.5.87L13 19l-1.5 1.87L10 19l-2.5 1.87L6 19l-1.5 1.87A1 1 0 0 1 3 20V4a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        Pajak / KIR Akan Berakhir (H-${EXPIRY_WARNING_DAYS})
      </div>
      ${expiringVehicles.map(v => {
        const pajakInfo = getExpiryStatus(v.pajakExpiry);
        const kirInfo = getExpiryStatus(v.kirExpiry);
        const parts = [];
        if(pajakInfo.status==='expired' || pajakInfo.status==='warning') parts.push(`Pajak: ${expiryStatusLabel(pajakInfo)}`);
        if(kirInfo.status==='expired' || kirInfo.status==='warning') parts.push(`KIR: ${expiryStatusLabel(kirInfo)}`);
        const worstStatus = (pajakInfo.status==='expired' || kirInfo.status==='expired') ? 'expired' : 'warning';
        return `<div class="detail-row" style="cursor:pointer;" onclick="switchTab('pajak'); setTimeout(()=>openPajakKirForm('${v.id}'),250);">
          <span class="dl">${escapeHtml(v.plate)}</span>
          <span class="dv" style="color:${expiryStatusColor(worstStatus)}">${parts.join(' · ')}</span>
        </div>`;
      }).join('')}
    </div>`;

  // ---- Peringatan Ganti Oli (estimasi siklus 3 bulan sejak service oli terakhir) ----
  const oliDueVehicles = getOliDueVehicles();
  const oliDueHtml = oliDueVehicles.length === 0 ? '' : `
    <div class="divider-label"><span>Perlu Perhatian</span></div>
    <div class="panel" style="border-color: rgba(251,191,107,0.3);">
      <div class="panel-title" style="color:var(--warn);">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2v4m0 12v4m10-10h-4M6 12H2m15.5-6.5l-2.8 2.8M9.3 14.7l-2.8 2.8m11-0l-2.8-2.8M9.3 9.3 6.5 6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
        Waktunya Ganti Oli (Siklus 3 Bulan)
      </div>
      ${oliDueVehicles.map(v => {
        const oli = getOliStatus(v.id);
        return `<div class="detail-row" style="cursor:pointer;" onclick="switchTab('service'); setTimeout(()=>openServiceForm(null,'${v.id}'),250);">
          <span class="dl">${escapeHtml(v.plate)}</span>
          <span class="dv" style="color:${expiryStatusColor(oli.status)}">Oli terakhir ${fmtDate(oli.lastDate)} · ${expiryStatusLabel(oli)}</span>
        </div>`;
      }).join('')}
    </div>`;

  // ---- Ringkasan per kategori/cabang ----
  const categoryBreakdown = categorySortedList().map(c => ({
    name: c.name,
    count: DB.vehicles.filter(v => v.categoryId === c.id).length
  })).filter(c => c.count > 0).sort((a,b)=> b.count - a.count);
  const uncategorizedCount = DB.vehicles.filter(v => !v.categoryId || !getCategory(v.categoryId)).length;
  if(uncategorizedCount > 0) categoryBreakdown.push({ name: 'Tanpa Kategori', count: uncategorizedCount });

  const categoryHtml = (totalVeh === 0 || categoryBreakdown.length === 0) ? '' : `
    <div class="divider-label"><span>Kendaraan per Kategori</span></div>
    <div class="panel">
      ${categoryBreakdown.map(c => {
        const pct = totalVeh > 0 ? Math.round((c.count/totalVeh)*100) : 0;
        return `
        <div style="margin-bottom:11px;">
          <div style="display:flex; justify-content:space-between; font-size:13.5px; margin-bottom:5px;">
            <span style="color:var(--text);">${escapeHtml(c.name)}</span>
            <span style="color:var(--text-dim);">${c.count} kendaraan</span>
          </div>
          <div style="height:7px; background:var(--bg-soft); border-radius:99px; overflow:hidden;">
            <div style="height:100%; width:${pct}%; background:var(--accent); border-radius:99px;"></div>
          </div>
        </div>`;
      }).join('')}
    </div>`;

  // ---- Tren service 6 bulan terakhir ----
  function monthKey(iso){ return iso.slice(0,7); } // YYYY-MM
  function monthLabel(key){
    const [y,m] = key.split('-');
    const names = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    return names[parseInt(m,10)-1];
  }
  const monthKeys = [];
  { const d = new Date(today + 'T00:00:00');
    for(let i=5;i>=0;i--){
      const dd = new Date(d.getFullYear(), d.getMonth()-i, 1);
      monthKeys.push(dd.getFullYear() + '-' + String(dd.getMonth()+1).padStart(2,'0'));
    }
  }
  const monthCounts = monthKeys.map(mk => ({
    key: mk,
    label: monthLabel(mk),
    count: DB.services.filter(s => monthKey(s.date) === mk).length
  }));
  const maxMonthCount = Math.max(1, ...monthCounts.map(m=>m.count));
  const trendHtml = totalSvc === 0 ? '' : `
    <div class="divider-label"><span>Tren Service 6 Bulan Terakhir</span></div>
    <div class="panel">
      <div style="display:flex; align-items:flex-end; gap:8px; height:90px;">
        ${monthCounts.map(m => `
          <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;">
            <span style="font-size:11px; color:var(--text-dim); font-weight:700;">${m.count > 0 ? m.count : ''}</span>
            <div style="width:100%; max-width:28px; border-radius:5px 5px 2px 2px; background:${m.count>0?'var(--accent)':'var(--bg-soft)'}; height:${Math.max(4,(m.count/maxMonthCount)*56)}px;"></div>
            <span style="font-size:10.5px; color:var(--text-faint);">${m.label}</span>
          </div>`).join('')}
      </div>
    </div>`;

  el.innerHTML = `
    <div class="view-header">
      <div class="view-title">Dashboard</div>
      <div class="view-sub">Ringkasan armada Gunex Transport</div>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num">${totalVeh}</div><div class="stat-label">Kendaraan</div></div>
      <div class="stat-card good"><div class="stat-num">${totalSvc}</div><div class="stat-label">Riwayat Service</div></div>
      <div class="stat-card"><div class="stat-num">${totalTire}</div><div class="stat-label">Riwayat Ban</div></div>
    </div>

    ${pajakKirSummaryHtml}
    ${expiringHtml}
    ${oliDueHtml}
    ${staleHtml}
    ${categoryHtml}
    ${trendHtml}

    <div class="divider-label"><span>Aktivitas Terbaru</span></div>
    ${recentHtml}
  `;
}

function exportBackup(){
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gunex-fleet-backup-${todayISO()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('Backup berhasil diunduh');
}

/* ============================================================
   PDF REPORT — Semua Kendaraan (data master, ban, riwayat service)
   ============================================================ */
function exportPdfReport(){
  if(typeof window.jspdf === 'undefined'){
    showToast('Memuat modul PDF, tunggu sebentar lalu coba lagi...', true);
    return;
  }
  if(DB.vehicles.length === 0){
    showToast('Belum ada data kendaraan untuk dibuat report', true);
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const marginX = 40;
  const contentW = pageW - marginX * 2;
  let y = 0;

  const COLOR_TEXT = [20, 30, 45];
  const COLOR_DIM = [110, 125, 145];
  const COLOR_ACCENT = [30, 110, 150];
  const COLOR_LINE = [215, 222, 232];
  const COLOR_GOOD = [30, 140, 90];
  const COLOR_WARN = [180, 120, 20];
  const COLOR_BAD = [190, 60, 60];

  function checkPageBreak(neededHeight){
    if(y + neededHeight > pageH - 50){
      doc.addPage();
      drawHeader();
      return true;
    }
    return false;
  }

  function drawHeader(){
    doc.setFillColor(8, 14, 28);
    doc.rect(0, 0, pageW, 56, 'F');
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold');
    doc.setFontSize(13);
    doc.text('GUNEX FLEET', marginX, 33);
    doc.setFont('helvetica','normal');
    doc.setFontSize(8.5);
    doc.setTextColor(180,210,230);
    doc.text('Report Pendataan Service, Ban & Pajak Kendaraan', marginX, 45);
    doc.setFontSize(8.5);
    doc.setTextColor(180,210,230);
    doc.text(fmtDate(todayISO()), pageW - marginX, 45, { align: 'right' });
    y = 78;
  }

  function drawFooterAllPages(){
    const total = doc.internal.getNumberOfPages();
    for(let i=1;i<=total;i++){
      doc.setPage(i);
      doc.setFont('helvetica','normal');
      doc.setFontSize(8);
      doc.setTextColor(150,160,175);
      doc.text(`Halaman ${i} dari ${total}`, pageW/2, pageH - 25, { align: 'center' });
      doc.text('Dicetak otomatis oleh GUNEX FLEET — data tersimpan lokal di perangkat', pageW/2, pageH - 15, { align: 'center' });
    }
  }

  function sectionTitle(text){
    checkPageBreak(26);
    doc.setFont('helvetica','bold');
    doc.setFontSize(10.5);
    doc.setTextColor(...COLOR_ACCENT);
    doc.text(text.toUpperCase(), marginX, y);
    doc.setDrawColor(...COLOR_LINE);
    doc.setLineWidth(0.7);
    doc.line(marginX, y+4, pageW - marginX, y+4);
    y += 18;
  }

  function kv(label, value, colW){
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(...COLOR_DIM);
    doc.text(label, marginX, y);
    doc.setTextColor(...COLOR_TEXT);
    doc.setFont('helvetica','bold');
    doc.text(String(value ?? '—'), marginX + (colW||120), y);
  }

  drawHeader();

  // ===== Halaman sampul: ringkasan armada =====
  doc.setFont('helvetica','bold');
  doc.setFontSize(16);
  doc.setTextColor(...COLOR_TEXT);
  doc.text('Ringkasan Armada', marginX, y + 6);
  y += 28;

  const totalVeh = DB.vehicles.length;
  const totalSvc = DB.services.length;
  const totalTire = DB.tireEvents.length;
  const today = todayISO();
  const staleVehicles = DB.vehicles.filter(v => {
    const svcs = DB.services.filter(s => s.vehicleId === v.id);
    if(svcs.length === 0) return true;
    const last = svcs.slice().sort((a,b)=>b.date.localeCompare(a.date))[0];
    return daysBetween(last.date, today) > 90;
  });

  const statBoxW = (contentW - 20) / 3;
  const stats = [
    { label: 'Total Kendaraan', value: totalVeh },
    { label: 'Riwayat Service', value: totalSvc },
    { label: 'Riwayat Ganti Ban', value: totalTire },
  ];
  stats.forEach((s,i) => {
    const bx = marginX + i*(statBoxW+10);
    doc.setDrawColor(...COLOR_LINE);
    doc.setLineWidth(0.7);
    doc.roundedRect(bx, y, statBoxW, 50, 4, 4);
    doc.setFont('helvetica','bold');
    doc.setFontSize(18);
    doc.setTextColor(...COLOR_ACCENT);
    doc.text(String(s.value), bx+12, y+28);
    doc.setFont('helvetica','normal');
    doc.setFontSize(8.5);
    doc.setTextColor(...COLOR_DIM);
    doc.text(s.label, bx+12, y+41);
  });
  y += 70;

  if(staleVehicles.length > 0){
    sectionTitle('Perlu Perhatian — Belum Service 90+ Hari');
    staleVehicles.forEach(v => {
      checkPageBreak(16);
      doc.setFont('helvetica','normal');
      doc.setFontSize(9.5);
      doc.setTextColor(...COLOR_BAD);
      doc.text(`• ${v.plate} — ${v.merk} ${v.type}`, marginX, y);
      y += 15;
    });
    y += 6;
  }

  // ===== Daftar Kendaraan (dikelompokkan per kategori) =====
  sectionTitle('Daftar Kendaraan');

  function drawVehicleTableHeader(){
    doc.setFont('helvetica','bold');
    doc.setFontSize(8.5);
    doc.setTextColor(...COLOR_DIM);
    doc.text('NO. POLISI', tableColX[0], y);
    doc.text('MERK / TYPE', tableColX[1], y);
    doc.text('TAHUN', tableColX[2], y);
    doc.text('SERVICE', tableColX[3], y);
    doc.text('BAN', tableColX[4], y);
    y += 6;
    doc.setDrawColor(...COLOR_LINE);
    doc.line(marginX, y, pageW-marginX, y);
    y += 12;
  }

  const tableColX = [marginX, marginX+95, marginX+260, marginX+340, marginX+420];

  // Kelompokkan kendaraan: per kategori (urut nama), lalu yang tanpa kategori di akhir
  const categoriesSorted = categorySortedList();
  const groups = categoriesSorted.map(c => ({
    label: c.name,
    vehicles: DB.vehicles.filter(v => v.categoryId === c.id).sort((a,b)=>a.plate.localeCompare(b.plate))
  })).filter(g => g.vehicles.length > 0);
  const uncategorized = DB.vehicles.filter(v => !v.categoryId || !getCategory(v.categoryId)).sort((a,b)=>a.plate.localeCompare(b.plate));
  if(uncategorized.length > 0) groups.push({ label: 'Tanpa Kategori', vehicles: uncategorized });

  groups.forEach(group => {
    checkPageBreak(30);
    doc.setFont('helvetica','bold');
    doc.setFontSize(10);
    doc.setTextColor(...COLOR_TEXT);
    doc.text(group.label, marginX, y);
    doc.setFont('helvetica','normal');
    doc.setFontSize(8.5);
    doc.setTextColor(...COLOR_DIM);
    doc.text(`${group.vehicles.length} kendaraan`, pageW - marginX, y, { align: 'right' });
    y += 12;
    drawVehicleTableHeader();

    group.vehicles.forEach(v => {
      checkPageBreak(16);
      const svcCount = DB.services.filter(s=>s.vehicleId===v.id).length;
      const tireCount = DB.tireEvents.filter(t=>t.vehicleId===v.id).length;
      doc.setFont('helvetica','bold');
      doc.setFontSize(9);
      doc.setTextColor(...COLOR_TEXT);
      doc.text(v.plate, tableColX[0], y);
      doc.setFont('helvetica','normal');
      doc.setTextColor(...COLOR_DIM);
      doc.text(`${v.merk} ${v.type}`, tableColX[1], y, { maxWidth: 160 });
      doc.text(String(v.tahun), tableColX[2], y);
      doc.text(String(svcCount), tableColX[3], y);
      doc.text(String(tireCount), tableColX[4], y);
      y += 15;
    });
    y += 8;
  });

  // ===== Detail per kendaraan =====
  DB.vehicles.slice().sort((a,b)=>a.plate.localeCompare(b.plate)).forEach(v => {
    doc.addPage();
    drawHeader();

    doc.setFont('helvetica','bold');
    doc.setFontSize(15);
    doc.setTextColor(...COLOR_TEXT);
    doc.text(v.plate, marginX, y+6);
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.setTextColor(...COLOR_DIM);
    const catLabel = getCategoryLabel(v.categoryId);
    doc.text(`${v.merk} ${v.type} · Tahun ${v.tahun}${catLabel ? ' · ' + catLabel : ''}`, marginX, y+22);
    let infoLineY = y + 35;
    if(v.driverName){
      doc.setFontSize(9.5);
      doc.text(`Supir: ${v.driverName}`, marginX, infoLineY);
      infoLineY += 13;
      y += 13;
    }
    if(v.pajakExpiry || v.kirExpiry){
      doc.setFontSize(9.5);
      const pajakInfo = getExpiryStatus(v.pajakExpiry);
      const kirInfo = getExpiryStatus(v.kirExpiry);
      const pdfStatusColor = (status) => {
        if(status === 'expired') return COLOR_BAD;
        if(status === 'warning') return COLOR_WARN;
        if(status === 'ok') return COLOR_GOOD;
        return COLOR_DIM;
      };
      let lineX = marginX;
      doc.setTextColor(...COLOR_DIM);
      doc.text('Pajak: ', lineX, infoLineY);
      lineX += doc.getTextWidth('Pajak: ');
      doc.setTextColor(...pdfStatusColor(pajakInfo.status));
      const pajakText = v.pajakExpiry ? `${fmtDate(v.pajakExpiry)} (${expiryStatusLabel(pajakInfo)})` : 'Belum diisi';
      doc.text(pajakText, lineX, infoLineY);
      lineX += doc.getTextWidth(pajakText) + 14;
      doc.setTextColor(...COLOR_DIM);
      doc.text('·  KIR: ', lineX, infoLineY);
      lineX += doc.getTextWidth('·  KIR: ');
      doc.setTextColor(...pdfStatusColor(kirInfo.status));
      const kirText = v.kirExpiry ? `${fmtDate(v.kirExpiry)} (${expiryStatusLabel(kirInfo)})` : 'Belum diisi';
      doc.text(kirText, lineX, infoLineY);
      y += 13;
    }
    y += 40;

    // --- Status Ban per posisi ---
    sectionTitle('Status Ban Terkini');
    TIRE_POSITIONS.forEach(pos => {
      checkPageBreak(16);
      const t = getLatestTireForPosition(v.id, pos.key);
      doc.setFont('helvetica','bold');
      doc.setFontSize(9);
      doc.setTextColor(...COLOR_TEXT);
      doc.text(`${pos.key} — ${pos.label}`, marginX, y);
      doc.setFont('helvetica','normal');
      doc.setFontSize(9);
      if(t){
        const condLabel = t.parts && t.parts.luar
          ? (t.parts.luar.condition === 'vulkanisir' ? 'Vulkanisir' : 'Baru')
          : '—';
        const condColor = t.parts && t.parts.luar && t.parts.luar.condition === 'vulkanisir' ? COLOR_WARN : COLOR_GOOD;
        doc.setTextColor(...condColor);
        doc.text(condLabel, marginX + 230, y);
        doc.setTextColor(...COLOR_DIM);
        const serial = t.parts && t.parts.luar && t.parts.luar.serial ? t.parts.luar.serial : '—';
        doc.text(`SN: ${serial}`, marginX + 300, y, { maxWidth: 140 });
        doc.text(fmtDate(t.date), pageW - marginX, y, { align: 'right' });
      } else {
        doc.setTextColor(...COLOR_DIM);
        doc.text('Belum ada data', marginX + 230, y);
      }
      y += 15;
    });
    y += 8;

    // --- Riwayat Service ---
    sectionTitle('Riwayat Service');
    const svcList = DB.services.filter(s=>s.vehicleId===v.id).sort((a,b)=> b.date.localeCompare(a.date));
    if(svcList.length === 0){
      checkPageBreak(16);
      doc.setFont('helvetica','normal');
      doc.setFontSize(9.5);
      doc.setTextColor(...COLOR_DIM);
      doc.text('Belum ada riwayat service untuk kendaraan ini.', marginX, y);
      y += 16;
    } else {
      svcList.forEach(s => {
        const doneItems = SERVICE_ITEMS.filter(it => s.items[it.key]).map(it=>it.label);
        const lineText = doneItems.length ? doneItems.join(', ') : 'Tidak ada item dicatat';
        checkPageBreak(30);
        doc.setFont('helvetica','bold');
        doc.setFontSize(9.5);
        doc.setTextColor(...COLOR_TEXT);
        doc.text(fmtDate(s.date), marginX, y);
        if(s.odometer){
          doc.setFont('helvetica','normal');
          doc.setTextColor(...COLOR_DIM);
          doc.text(`${Number(s.odometer).toLocaleString('id-ID')} km`, marginX + 90, y);
        }
        y += 13;
        doc.setFont('helvetica','normal');
        doc.setFontSize(8.5);
        doc.setTextColor(...COLOR_DIM);
        const wrapped = doc.splitTextToSize(lineText, contentW - 10);
        doc.text(wrapped, marginX + 10, y);
        y += wrapped.length * 11 + 6;
      });
    }
  });

  drawFooterAllPages();
  doc.save(`gunex-fleet-report-${todayISO()}.pdf`);
  showToast('Report PDF berhasil diunduh');
}

function csvEscape(val){
  const s = String(val ?? '');
  if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}

function exportCsv(){
  const header = ['No Polisi','Merk','Type','Tahun','Kategori','Nama Supir','Tanggal Service','Odometer',
    ...SERVICE_ITEMS.map(it=>it.label), 'Catatan'];
  const lines = [header.map(csvEscape).join(',')];
  DB.services.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(s => {
    const v = getVehicle(s.vehicleId);
    const row = [
      v?v.plate:'', v?v.merk:'', v?v.type:'', v?v.tahun:'', v ? (getCategoryLabel(v.categoryId)||'') : '', v ? (v.driverName||'') : '',
      s.date, s.odometer ?? '',
      ...SERVICE_ITEMS.map(it => s.items[it.key] ? 'Ya' : 'Tidak'),
      s.note || ''
    ];
    lines.push(row.map(csvEscape).join(','));
  });
  const blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gunex-riwayat-service-${todayISO()}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('CSV berhasil diunduh');
}

function restoreBackup(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed || !Array.isArray(parsed.vehicles)) throw new Error('Format tidak valid');
      if(!confirm('Memulihkan backup akan menggantikan semua data saat ini. Lanjutkan?')) return;
      DB = {
        vehicles: parsed.vehicles || [],
        services: parsed.services || [],
        tireEvents: parsed.tireEvents || [],
        categories: parsed.categories || []
      };
      saveDB();
      closeSheet();
      showToast('Data berhasil dipulihkan');
      renderView(currentTab);
    }catch(err){
      showToast('File backup tidak valid', true);
    }
  };
  reader.readAsText(file);
}

function addCategoryPrompt(){
  const html = sheetWrap('Tambah Kategori', `
    <div class="field">
      <label class="field-label">Nama Kategori <span class="req">*</span></label>
      <input type="text" id="newcat_name" placeholder="cth: Cabang Jakarta, PT Sumber Makmur">
    </div>
    <button class="btn btn-primary" onclick="
      const name=document.getElementById('newcat_name').value.trim();
      if(!name){ showToast('Nama kategori tidak boleh kosong', true); return; }
      const dup = DB.categories.find(c=>c.name.toLowerCase()===name.toLowerCase());
      if(dup){ showToast('Kategori dengan nama ini sudah ada', true); return; }
      findOrCreateCategory(name);
      saveDB();
      showToast('Kategori ditambahkan');
      openCategoryManager();
    ">Simpan</button>
  `);
  openSheet(html);
  setTimeout(()=> { const el = document.getElementById('newcat_name'); if(el) el.focus(); }, 200);

function renameCategoryPrompt(categoryId){
  const cat = getCategory(categoryId);
  if(!cat) return;
  const html = sheetWrap('Ubah Nama Kategori', `
    <div class="field">
      <label class="field-label">Nama Kategori <span class="req">*</span></label>
      <input type="text" id="renamecat_name" value="${escapeHtml(cat.name)}">
    </div>
    <button class="btn btn-primary" onclick="
      const name=document.getElementById('renamecat_name').value.trim();
      if(!name){ showToast('Nama kategori tidak boleh kosong', true); return; }
      const dup = DB.categories.find(c=>c.name.toLowerCase()===name.toLowerCase() && c.id!=='${categoryId}');
      if(dup){ showToast('Kategori dengan nama ini sudah ada', true); return; }
      renameCategory('${categoryId}', name);
    ">Simpan</button>
  `);
  openSheet(html);
  setTimeout(()=> { const el = document.getElementById('renamecat_name'); if(el) el.focus(); }, 200);
}

function renameCategory(categoryId, newName){
  const cat = getCategory(categoryId);
  if(!cat) return;
  cat.name = newName;
  saveDB();
  showToast('Nama kategori diperbarui');
  openCategoryManager();
}

function deleteCategoryConfirm(categoryId){
  const count = DB.vehicles.filter(v => v.categoryId === categoryId).length;
  const msg = count > 0
    ? `${count} kendaraan memakai kategori ini dan akan menjadi "Tanpa kategori". Lanjutkan hapus?`
    : 'Hapus kategori ini?';
  if(!confirm(msg)) return;
  DB.vehicles.forEach(v => { if(v.categoryId === categoryId) v.categoryId = ''; });
  DB.categories = DB.categories.filter(c => c.id !== categoryId);
  saveDB();
  showToast('Kategori dihapus');
  openCategoryManager();
  if(currentTab === 'master') renderMasterList();
}

function openSetPinSheet(){
  const html = sheetWrap('Atur PIN Akses Cepat', `
    <div class="field-hint" style="margin-bottom:16px; line-height:1.6;">
      Masukkan 6 digit PIN baru, lalu ulangi sekali lagi untuk konfirmasi.
      PIN lama (jika ada) akan langsung tidak berlaku begitu PIN baru disimpan.
    </div>
    <div class="field">
      <label class="field-label">PIN Baru <span class="req">*</span></label>
      <input type="text" inputmode="numeric" maxlength="6" id="setPinNew" placeholder="6 digit angka" style="letter-spacing:.3em; font-size:1.1rem; text-align:center;">
    </div>
    <div class="field">
      <label class="field-label">Ulangi PIN Baru <span class="req">*</span></label>
      <input type="text" inputmode="numeric" maxlength="6" id="setPinConfirm" placeholder="6 digit angka" style="letter-spacing:.3em; font-size:1.1rem; text-align:center;">
    </div>
    <div id="setPinMsg" style="font-size:.82rem; margin-bottom:4px; min-height:18px;"></div>
    <button class="btn btn-primary" style="margin-top:10px;" onclick="submitSetPin()">Simpan PIN</button>
  `);
  openSheet(html);
  ['setPinNew', 'setPinConfirm'].forEach(id => {
    document.getElementById(id).addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
    });
  });
}

async function submitSetPin(){
  const pin = document.getElementById('setPinNew').value;
  const confirmPin = document.getElementById('setPinConfirm').value;
  const msg = document.getElementById('setPinMsg');
  if(pin.length !== 6){
    msg.style.color = '#ff8080'; msg.textContent = 'PIN harus tepat 6 digit angka.'; return;
  }
  if(pin !== confirmPin){
    msg.style.color = '#ff8080'; msg.textContent = 'PIN baru dan konfirmasi tidak sama.'; return;
  }
  try{
    const res = await fetch('/api/auth/set-fleet-pin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ newPin: pin })
    });
    const data = await res.json();
    if(data.ok){
      closeSheet();
      showToast('PIN akses cepat berhasil disimpan');
    } else {
      msg.style.color = '#ff8080'; msg.textContent = data.error || 'Gagal menyimpan PIN.';
    }
  }catch(e){
    msg.style.color = '#ff8080'; msg.textContent = 'Tidak dapat terhubung ke server.';
  }
}

function confirmWipeAll(){
  if(!confirm('Tindakan ini akan menghapus SEMUA data kendaraan, service, dan ban secara permanen. Yakin lanjutkan?')) return;
  if(!confirm('Konfirmasi sekali lagi: hapus semua data sekarang?')) return;
  DB = { vehicles: [], services: [], tireEvents: [], categories: [] };
  saveDB();
  closeSheet();
  showToast('Semua data telah dihapus');
  renderView(currentTab);
}

/* ============================================================
   INIT
   ============================================================ */
let isFleetOnlySession = false; // true jika masuk lewat PIN (sesi terbatas), bukan login admin penuh

function initApp(){
  if(window.MAINTENANCE_MODE){
    document.getElementById('maintOverlay').classList.add('active');
    return;
  }

  // Deteksi jenis sesi SEKALI di awal — dipakai untuk menyembunyikan menu
  // "Atur PIN" dari sesi yang masuk lewat PIN itu sendiri (mengganti PIN tetap
  // wajib login admin penuh, sesuai pembatasan yang sudah ditegakkan di server).
  fetch('/api/auth/me').then(r => r.json()).then(data => {
    isFleetOnlySession = !!(data.ok && data.fleetOnly);
  }).catch(() => {});

  // PENTING — urutan pemeriksaan ini sengaja dirancang untuk mencegah hilangnya
  // perubahan yang sempat tersimpan di localStorage tapi BELUM pernah berhasil
  // tersinkron ke server (kasus ekstrem: perangkat mati/koneksi putus total
  // tepat setelah perubahan dibuat, sebelum semua jaring pengaman sync lain
  // sempat berjalan). Tanpa pemeriksaan ini, begitu server bisa dihubungi lagi,
  // datanya akan langsung tertimpa data server yang lebih lama → data hilang.
  if (hasUnsyncedLocalData()) {
    const localData = loadDBFromLocalStorage();
    console.warn('[fleet] Ditemukan data lokal yang belum pernah tersinkron ke server. Mencoba mengirimkannya dulu sebelum memuat data server...');
    DB = localData;
    if(!Array.isArray(DB.categories)) DB.categories = [];
    if(!Array.isArray(DB.vehicles)) DB.vehicles = [];
    if(!Array.isArray(DB.services)) DB.services = [];
    if(!Array.isArray(DB.tireEvents)) DB.tireEvents = [];
    hasUnsyncedChanges = true;
    updateSyncIndicator();
    renderDashboard();
    updateFab('dashboard');
    // Coba sinkronkan SEKARANG. Jika berhasil, data lokal yang sempat "terjebak"
    // ini resmi jadi data server yang dipakai bersama. Jika gagal (masih
    // offline), retry loop yang sudah berjalan (lihat ensureRetryLoopRunning)
    // akan terus mencoba di latar belakang tanpa mengganggu pengguna.
    syncDBToServer(true);
    return;
  }

  // Tidak ada risiko data lokal tertinggal -> aman mengambil data dari server
  // seperti biasa (data yang sama akan terlihat dari perangkat manapun). Jika
  // server tidak terjangkau, pakai cadangan localStorage supaya aplikasi tetap
  // bisa dipakai walau sedang offline.
  fetchFleetDataFromServer().then(serverData => {
    if(serverData){
      DB = serverData;
      if(!Array.isArray(DB.categories)) DB.categories = [];
      if(!Array.isArray(DB.vehicles)) DB.vehicles = [];
      if(!Array.isArray(DB.services)) DB.services = [];
      if(!Array.isArray(DB.tireEvents)) DB.tireEvents = [];
      // Data resmi dari server dianggap sebagai titik "aman" terbaru -> simpan
      // sebagai cadangan lokal dan tandai tersinkron, supaya pemeriksaan
      // hasUnsyncedLocalData() di kunjungan berikutnya tidak salah curiga.
      saveDBToLocalStorage();
      markLocalDataAsSynced();
    } else {
      DB = loadDBFromLocalStorage();
    }
    renderDashboard();
    updateFab('dashboard');
  });
}
document.addEventListener('DOMContentLoaded', initApp);
</script>
